<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IT Grading System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #2c5364, #4facfe);
    margin: 0;
    padding: 15px;
    color: #333;
}

h1 {
    text-align: center;
    color: #ffffff;
    margin-bottom: 15px;
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: auto;
    background: #ffffff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* FORM GRID */
.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 10px;
}

.form-grid.full {
    grid-template-columns: 1fr;
}

label {
    font-size: 13px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

input:focus {
    border-color: #4facfe;
    outline: none;
    box-shadow: 0 0 5px #4facfe;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 12px;
    width: 100%;
    background: linear-gradient(135deg, #4facfe, #00c6ff);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.02);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* TABLE */
.table-container {
    overflow-x: auto;
    margin-top: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 750px;
}

th, td {
    padding: 10px;
    text-align: center;
    font-size: 14px;
}

th {
    background: #4facfe;
    color: white;
}

td {
    border-bottom: 1px solid #ddd;
}

tr:hover {
    background: #f2f9ff;
}

/* STATUS */
.pass {
    color: #28a745;
    font-weight: bold;
}

.fail {
    color: #dc3545;
    font-weight: bold;
}

/* MOBILE */
@media (max-width: 600px) {
    .form-grid {
        grid-template-columns: 1fr;
    }

    table {
        min-width: 600px;
    }

    h1 {
        font-size: 18px;
    }
}
</style>
</head>

<body>

<h1>IT Grading System</h1>

<div class="container">

    <div class="form-grid">
        <div>
            <label>Student Name</label>
            <input type="text" id="name">
        </div>

        <div>
            <label>Section</label>
            <input type="text" id="section">
        </div>
    </div>

    <div class="form-grid">
        <div>
            <label>Quiz (20%)</label>
            <input type="number" id="quiz">
        </div>

        <div>
            <label>Laboratory (30%)</label>
            <input type="number" id="lab">
        </div>

        <div>
            <label>Assignment (10%)</label>
            <input type="number" id="assign">
        </div>

        <div>
            <label>Attendance (10%)</label>
            <input type="number" id="attendance">
        </div>

        <div class="full">
            <label>Major Exam (30%)</label>
            <input type="number" id="exam">
        </div>
    </div>

    <button onclick="computeGrade()">Submit Grades</button>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Section</th>
                    <th>Quiz</th>
                    <th>Lab</th>
                    <th>Assignment</th>
                    <th>Attendance</th>
                    <th>Exam</th>
                    <th>Total</th>
                    <th>Equivalent</th>
                    <th>Remarks</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script>
function computeGrade() {
    let name = document.getElementById("name").value;
    let section = document.getElementById("section").value;

    let quiz = parseFloat(document.getElementById("quiz").value) || 0;
    let lab = parseFloat(document.getElementById("lab").value) || 0;
    let assign = parseFloat(document.getElementById("assign").value) || 0;
    let attendance = parseFloat(document.getElementById("attendance").value) || 0;
    let exam = parseFloat(document.getElementById("exam").value) || 0;

    let total = (quiz * 0.20) + (lab * 0.30) + (assign * 0.10) + (attendance * 0.10) + (exam * 0.30);

    let equivalent = "";
    if (total >= 90) equivalent = "1.0";
    else if (total >= 85) equivalent = "1.25";
    else if (total >= 80) equivalent = "1.5";
    else if (total >= 75) equivalent = "2.0";
    else if (total >= 70) equivalent = "2.5";
    else if (total >= 65) equivalent = "3.0";
    else equivalent = "5.0";

    let remarks = total >= 75 ? "PASSED" : "FAILED";
    let className = total >= 75 ? "pass" : "fail";

    let row = `
        <tr>
            <td>${name}</td>
            <td>${section}</td>
            <td>${quiz}</td>
            <td>${lab}</td>
            <td>${assign}</td>
            <td>${attendance}</td>
            <td>${exam}</td>
            <td>${total.toFixed(2)}</td>
            <td>${equivalent}</td>
            <td class="${className}">${remarks}</td>
        </tr>
    `;

    document.getElementById("tableBody").innerHTML += row;

    document.querySelectorAll("input").forEach(input => input.value = "");
}
</script>

</body>
</html>
